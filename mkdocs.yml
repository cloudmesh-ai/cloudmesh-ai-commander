docs_dir: docs
extra_css:
- css/custom.css
nav:
- Home: index.md
- Documentation:
  - Gemma: README-gemma.md
  - Mock Service: README-mock.md
- Project:
  - Changelog: CHANGELOG.md
  - GitHub: https://github.com/cloudmesh-ai/cloudmesh-ai-commander
  - Issues: https://github.com/cloudmesh-ai/cloudmesh-ai-commander/issues
- API Reference: api.md
- README-mock: README-mock.md
- README: README.md
- README-gemma: README-gemma.md
plugins:
- search
- mkdocstrings:
    handlers:
      python:
        options:
          docstring_section_style: table
          docstring_style: google
          group_by_category: true
          members: true
          separate_signature: true
          show_category_heading: true
          show_root_full_path: true
          show_source: true
          show_submodules: true
        paths:
        - src
site_name: Cloudmesh AI Commander
theme:
  favicon: assets/favicon.ico
  logo: assets/logo-white.png
  name: material
use_directory_urls: false
